<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#161b22"/>
    </pattern>
    <linearGradient id="cyanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D9FF" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#00D9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="hexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0d1117"/>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- Right glow sphere -->
  <circle cx="1270" cy="220" r="220" fill="url(#hexGlow)"/>

  <!-- Outer hex ring -->
  <polygon
    points="1270,30 1440,127 1440,313 1270,410 1100,313 1100,127"
    fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.12"/>

  <!-- Mid hex ring -->
  <polygon
    points="1270,80 1400,155 1400,285 1270,360 1140,285 1140,155"
    fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.22"/>

  <!-- Inner hex ring -->
  <polygon
    points="1270,130 1360,183 1360,257 1270,310 1180,257 1180,183"
    fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.45"/>

  <!-- Center circle -->
  <circle cx="1270" cy="220" r="52" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1270" cy="220" r="28" fill="#00D9FF" opacity="0.04"/>
  <circle cx="1270" cy="220" r="6" fill="#00D9FF" opacity="0.7"/>

  <!-- Radiating lines from center -->
  <line x1="1270" y1="220" x2="1270" y2="130" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1270" y1="220" x2="1360" y2="183" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1270" y1="220" x2="1360" y2="257" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1270" y1="220" x2="1270" y2="310" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1270" y1="220" x2="1180" y2="257" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="1270" y1="220" x2="1180" y2="183" stroke="#00D9FF" stroke-width="0.8" opacity="0.25"/>

  <!-- Small scatter dots -->
  <circle cx="1440" cy="380" r="4" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.35"/>
  <circle cx="1100" cy="60" r="3" fill="#00D9FF" opacity="0.4"/>
  <circle cx="1460" cy="90" r="2" fill="#00D9FF" opacity="0.5"/>
  <circle cx="1080" cy="400" r="2" fill="#00D9FF" opacity="0.35"/>
  <circle cx="1480" cy="300" r="5" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>

  <!-- Cross accent top-right -->
  <line x1="1456" y1="145" x2="1472" y2="145" stroke="#00D9FF" stroke-width="1.5" opacity="0.55"/>
  <line x1="1464" y1="137" x2="1464" y2="153" stroke="#00D9FF" stroke-width="1.5" opacity="0.55"/>

  <!-- Cross accent lower-left -->
  <line x1="1096" y1="360" x2="1112" y2="360" stroke="#00D9FF" stroke-width="1" opacity="0.4"/>
  <line x1="1104" y1="352" x2="1104" y2="368" stroke="#00D9FF" stroke-width="1" opacity="0.4"/>

  <!-- Right fade overlay to blend hex with left text -->
  <rect x="900" y="0" width="600" height="500" fill="url(#rightFade)"/>

  <!-- Left accent bar -->
  <rect x="80" y="148" width="4" height="176" rx="2" fill="#00D9FF" opacity="0.9"/>

  <!-- Name -->
  <text
    x="110" y="232"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="78" font-weight="700" fill="#FFFFFF" letter-spacing="-2"
    opacity="0.97">Jean Desauw</text>

  <!-- Title line -->
  <text
    x="114" y="292"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="500" fill="#00D9FF" letter-spacing="4">
    FULL-STACK ENGINEER · FREELANCE
  </text>

  <!-- Tagline -->
  <text
    x="116" y="344"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="#6e7681" letter-spacing="0.5">
    Building products people actually use.
  </text>

  <!-- Bottom glow line -->
  <rect x="0" y="497" width="1500" height="2" fill="url(#cyanLine)"/>
</svg>
